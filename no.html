<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有點難過... 💔</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4a3f5c 0%, #6b4a5a 40%, #9c6d7f 80%, #f8d7e6 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            padding: 3rem 2.8rem;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(80, 50, 70, 0.25);
            text-align: center;
            max-width: 420px;
            position: relative;
            z-index: 10;
            border: 2px solid rgba(255,255,255,0.6);
        }

        h1 {
            color: #6b4a5a;
            font-size: 2.7rem;
            margin: 0 0 1rem 0;
        }

        p {
            color: #5c4452;
            font-size: 1.38rem;
            line-height: 1.75;
        }

        .sad-heart {
            font-size: 85px;
            animation: heartbeat 2s infinite;
            display: block;
            margin: 10px 0 25px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.18); }
        }

        .tears {
            position: absolute;
            font-size: 26px;
            animation: fall 4.5s linear infinite;
            opacity: 0.75;
            z-index: 1;
        }

        @keyframes fall {
            0% { transform: translateY(-120px) rotate(0deg); opacity: 0; }
            15% { opacity: 0.9; }
            100% { transform: translateY(450px) rotate(25deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="sad-heart">💔</div>
        <h1>好吧... 我知道了 🥺</h1>
        <p>雖然有點難過<br>但還是很謝謝妳願意看這個網站</p>
    </div>

    <script>
        function createTear() {
            const tear = document.createElement('div');
            tear.classList.add('tears');
            tear.innerHTML = Math.random() > 0.5 ? '💧' : '💔';
            tear.style.left = Math.random() * 100 + 'vw';
            tear.style.animationDuration = (Math.random() * 2.5 + 3.5) + 's';
            tear.style.fontSize = (Math.random() * 14 + 20) + 'px';
            tear.style.opacity = Math.random() * 0.5 + 0.6;
            document.body.appendChild(tear);

            setTimeout(() => tear.remove(), 8000);
        }

        // Start falling tears
        setInterval(createTear, 160);

        // Initial burst of tears
        setTimeout(() => {
            for (let i = 0; i < 10; i++) {
                setTimeout(createTear, i * 100);
            }
        }, 600);
    </script>
</body>
</html>
