<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太好了！❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fff0f3 0%, #ff9eb7 50%, #ff4d6d 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 3.5rem 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(255, 77, 109, 0.3);
            text-align: center;
            position: relative;
            z-index: 10;
            border: 3px solid #fff;
            backdrop-filter: blur(12px);
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.3) rotate(-8deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        h1 {
            color: #ff4d6d;
            font-size: 3.8rem;
            margin: 0 0 1rem 0;
            text-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
        }

        p {
            color: #590d22;
            font-size: 1.6rem;
            line-height: 1.7;
        }

        .hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-heart {
            position: absolute;
            color: #ff758f;
            font-size: 28px;
            animation: floatHeart 6s linear infinite;
            opacity: 0;
            text-shadow: 0 0 8px rgba(255, 120, 143, 0.8);
        }

        @keyframes floatHeart {
            0% { transform: translateY(120vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="hearts-container" id="hearts"></div>
    
    <div class="card">
        <h1 id="title">耶！！❤️</h1>
        <p id="message">謝謝妳願意給我這個機會！<br>我會好好珍惜的。</p>
    </div>

    <script>
        // === Spectacular Confetti ===
        function launchConfetti() {
            const duration = 8000;
            const end = Date.now() + duration;

            const colors = ['#ff4d6d', '#ff758f', '#ffb3c6', '#ff9eb7', '#ffffff'];

            (function frame() {
                confetti({
                    particleCount: 8,
                    angle: 60,
                    spread: 70,
                    origin: { x: 0.1, y: Math.random() },
                    colors: colors
                });
                confetti({
                    particleCount: 8,
                    angle: 120,
                    spread: 70,
                    origin: { x: 0.9, y: Math.random() },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            })();
        }

        // === Floating Hearts + Petals ===
        function createFloatingItem() {
            const item = document.createElement('div');
            item.classList.add('floating-heart');
            
            // Randomly show heart or rose
            item.innerHTML = Math.random() > 0.6 ? '❤️' : '🌹';
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = (Math.random() * 4 + 5) + 's';
            item.style.fontSize = (Math.random() * 22 + 20) + 'px';
            item.style.opacity = Math.random() * 0.7 + 0.6;
            
            document.getElementById('hearts').appendChild(item);
            
            setTimeout(() => item.remove(), 12000);
        }

        // === Typing Effect ===
        function typeText(element, text, speed = 60) {
            let i = 0;
            element.innerHTML = '';
            const timer = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                }
            }, speed);
        }

        // Initialize everything
        window.onload = () => {
            launchConfetti();
            
            // Typing effect
            typeText(document.getElementById('message'), "謝謝妳願意給我這個機會！<br>我會好好珍惜的。", 80);

            // Continuous floating hearts
            setInterval(createFloatingItem, 280);
            
            // Extra burst after 1.5 seconds
            setTimeout(() => {
                confetti({ particleCount: 200, spread: 120, origin: { y: 0.6 } });
            }, 1500);
        };
    </script>
</body>
</html>
